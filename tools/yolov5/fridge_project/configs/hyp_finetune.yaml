# 阶段 C 微调用超参
# 关键差异(相对于 hyp.scratch-low.yaml):
#   - lr0 降为 1/10:已有不错的预训练权重,小步走避免破坏特征
#   - mosaic 降低:冰箱场景物品布局比较稳定,过强 mosaic 反而有害
#   - hsv_v 提高:冰箱内光照差异大,加强亮度增强
#   - flipud=0.5:冰箱顶视角下,上下翻转生成合理样本(物品可能从不同方向放入)
#   - warmup 降为 1.0:已有预训练,不需要长 warmup

lr0: 0.001          # ← 关键:从 0.01 降到 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 1.0  # ← 微调缩短 warmup
warmup_momentum: 0.8
warmup_bias_lr: 0.1
box: 0.05
cls: 0.5
cls_pw: 1.0
obj: 1.0
obj_pw: 1.0
iou_t: 0.20
anchor_t: 4.0
fl_gamma: 0.0

# --- 数据增强 ---
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.5          # ← 加强亮度抖动,模拟冰箱内开关门的光照变化
degrees: 5.0        # ← 加少量旋转,模拟相机轻微歪斜
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.5         # ← 冰箱顶视角:上下翻转合理
fliplr: 0.5
mosaic: 0.5         # ← 降低 mosaic,避免破坏冰箱场景的空间结构
mixup: 0.0
copy_paste: 0.0
