# =============================================================================
# 阶段 C 微调用超参（fine-tune hyperparameters）
# -----------------------------------------------------------------------------
# 这是 YOLOv5 训练时控制"学习速度 + 数据增强强度"的总开关。
# 阶段 B（公开数据集打底）和阶段 C（自采数据微调）应该用不同的 hyp:
#   - 阶段 B 用 hyp.scratch-low.yaml（YOLOv5 自带的，从零训练用）
#   - 阶段 C 用本文件，特点是"小学习率 + 弱增强"，避免破坏阶段 B 学到的特征
#
# 每个参数下面都标了：
#   作用 / 默认值（hyp.scratch-low.yaml）/ 当前值 / 推荐范围 / 调参方向
# =============================================================================


# ---- 1. 优化器（学习率 / 动量 / 权重衰减）-------------------------------

# lr0 — 初始学习率（initial learning rate）
# 作用：决定模型每一步参数更新的幅度。太大会震荡发散，太小学不动。
# 默认（hyp.scratch-low）：0.01
# 当前：0.001（阶段 B 的 1/10）
# 推荐范围：
#   - 微调（已有预训练权重）：0.001 ~ 0.005
#   - 从零训练：0.01
# 调参方向：训练曲线震荡剧烈→调小；loss 下降太慢→调大
lr0: 0.001

# lrf — 最终学习率因子（final lr fraction）
# 作用：训练结束时学习率 = lr0 * lrf。yolov5 默认用 cosine 退火从 lr0 衰减到 lr0*lrf
# 默认：0.01
# 当前：0.01
# 推荐范围：0.01 ~ 0.2
# 调参方向：通常不动。如果训练后期 mAP 还在涨，说明 lr 太小衰减得太凶，调大到 0.1
lrf: 0.01

# momentum — SGD 动量（momentum）
# 作用：让梯度更新带有"惯性"，能更稳地朝局部最优走，避免被噪声梯度带偏
# 默认：0.937
# 当前：0.937
# 推荐范围：0.9 ~ 0.95（几乎不用动）
momentum: 0.937

# weight_decay — 权重衰减（L2 正则化系数）
# 作用：每步给所有权重一个"往零靠"的力，防止过拟合
# 默认：0.0005
# 当前：0.0005
# 推荐范围：0.0001 ~ 0.001
# 调参方向：训练集 mAP 远高于验证集（过拟合）→ 调大；欠拟合 → 调小
weight_decay: 0.0005


# ---- 2. Warmup（预热阶段）---------------------------------------------

# warmup_epochs — 预热轮数
# 作用：训练最初几个 epoch 用很小的 lr 慢慢升到 lr0，让 BN 统计量稳定
# 默认：3.0
# 当前：1.0（微调缩短）
# 推荐范围：
#   - 从零训练：3.0
#   - 微调：1.0 ~ 2.0（已有预训练权重，不需要长预热）
warmup_epochs: 1.0

# warmup_momentum — 预热阶段的初始动量
# 作用：动量从 warmup_momentum 线性升到 momentum
# 默认：0.8
# 当前：0.8
# 推荐范围：通常不动
warmup_momentum: 0.8

# warmup_bias_lr — 预热阶段 bias 参数的初始学习率
# 作用：bias 参数比 weight 学得更快，预热时给它单独一个 lr
# 默认：0.1
# 当前：0.1
# 推荐范围：通常不动
warmup_bias_lr: 0.1


# ---- 3. 损失函数权重（loss components）-------------------------------
# YOLOv5 的总 loss = box_loss * box + obj_loss * obj + cls_loss * cls
# 这三个权重决定模型"更在意框准、更在意有没有物体、还是更在意分对类"

# box — 边界框回归损失权重
# 作用：让模型把框画得准。值越大越追求框对齐
# 默认：0.05
# 当前：0.05
# 推荐范围：0.02 ~ 0.2
# 调参方向：发现框总是偏大或偏小 → 调大；类别识别错很多 → 可调小让 cls 占比变大
box: 0.05

# cls — 分类损失权重
# 作用：让模型把类别分对
# 默认：0.5
# 当前：0.5
# 推荐范围：0.3 ~ 1.5
# 调参方向：类别多（你这是 43 类）且经常错分 → 调大到 0.8 ~ 1.0
cls: 0.5

# cls_pw — 分类损失 BCE 的正样本权重（positive weight）
# 作用：正样本 = "这个框里确实是某类" 的样本。值 > 1 时强调正样本
# 默认：1.0
# 当前：1.0
# 推荐范围：通常不动；类别极度不平衡时考虑调到 1.5 ~ 2.0
cls_pw: 1.0

# obj — 目标存在性损失权重（objectness loss weight）
# 作用：让模型判断"这个 anchor 里到底有没有物体"
# 默认：1.0
# 当前：1.0
# 推荐范围：0.5 ~ 2.0
# 调参方向：发现漏检很多（应该有的物体没检出）→ 调大；误检多 → 调小
obj: 1.0

# obj_pw — 目标存在性损失 BCE 的正样本权重
# 默认：1.0
# 当前：1.0
# 推荐范围：通常不动
obj_pw: 1.0


# ---- 4. IoU / Anchor 相关 ---------------------------------------------

# iou_t — IoU 训练阈值
# 作用：anchor 与 gt 框的 IoU 大于此值才被认为是"匹配上"，参与正样本 loss
# 默认：0.20
# 当前：0.20
# 推荐范围：0.10 ~ 0.30
# 调参方向：物体小或 anchor 不太合适 → 调小（0.10）让更多 anchor 能匹配上
iou_t: 0.15

# anchor_t — anchor 形状匹配阈值
# 作用：训练时如果 gt 框和 anchor 长宽比的比值超过此值，就跳过这个 anchor
# 默认：4.0（gt 宽高比和 anchor 差最多 4 倍）
# 当前：4.0
# 推荐范围：通常不动；如果你的物体长宽比变化极大（极扁或极长），可调到 6.0
anchor_t: 4.0

# fl_gamma — Focal Loss 的 gamma 参数
# 作用：> 0 时启用 Focal Loss，让"难样本"损失权重更大，缓解类别不平衡
# 默认：0.0（即不用 Focal Loss，用标准 BCE）
# 当前：0.0
# 推荐范围：
#   - 类别均衡：0.0
#   - 类别极度不平衡：0.5 ~ 2.0
# 你这数据集 hand 类多得过分（1883），其他几类极少（< 100），可以试 fl_gamma: 1.5
fl_gamma: 1.5


# ---- 5. 数据增强（颜色 / 几何 / 复合）---------------------------------
# 数据增强在训练时给图片加各种扰动，等于免费扩大数据集
# "微调"时一般要降低增强强度，因为自采数据的真实分布更值得让模型学
# 但你阶段 B 数据来自公开数据集（视角/光照/背景跟冰箱差很远），
# 增强加强一些反而能拉近域差距 → 所以这里把 mosaic / mixup 都开到了较高值

# hsv_h — Hue 色调抖动幅度
# 作用：随机改变色调（色相轮上转动），让模型不依赖具体颜色识别
# 默认：0.015
# 当前：0.015
# 推荐范围：0 ~ 0.05
# 调参方向：冰箱场景颜色相对固定，0.015 已经够了。调太大可能把红苹果训成绿色
hsv_h: 0.015

# hsv_s — Saturation 饱和度抖动幅度
# 作用：随机改变饱和度（颜色的鲜艳程度）
# 默认：0.7
# 当前：0.7
# 推荐范围：0.3 ~ 0.9
# 调参方向：冰箱内灯光会让饱和度变化，0.7 合适
hsv_s: 0.7

# hsv_v — Value 明度抖动幅度
# 作用：随机改变明度（亮度）
# 默认：0.4
# 当前：0.7（加强）
# 推荐范围：
#   - 标准场景：0.4
#   - 光照变化大（冰箱开关门 / 内灯亮灭）：0.5 ~ 0.8
# 推荐保持 0.7。这一项是冰箱场景下最重要的颜色增强
hsv_v: 0.7

# degrees — 随机旋转角度（±degrees 度内随机）
# 作用：让模型见到歪着的物体也认识
# 默认：0.0（YOLOv5 通用版本默认不旋转）
# 当前：15.0
# 推荐范围：
#   - 摄像头固定 + 物品有方向（如标签朝上）：0 ~ 5
#   - 冰箱内物品摆放方向随意：10 ~ 20
# 推荐保持 15.0；如果发现"颠倒的瓶子"识别不出来，可以加大
degrees: 15.0

# translate — 随机平移幅度（占图像宽高的比例）
# 作用：把物体随机往四周挪一点，让模型不依赖"物体总在中心"
# 默认：0.1
# 当前：0.1
# 推荐范围：0.0 ~ 0.2
translate: 0.1

# scale — 随机缩放幅度
# 作用：把物体随机放大或缩小（在 1±scale 之间）
# 默认：0.5
# 当前：0.5
# 推荐范围：0.3 ~ 0.9
# 调参方向：冰箱内远近距离差不大，0.5 够了；如果需要识别小物品可调到 0.7
scale: 0.7

# shear — 错切（shear）幅度，单位度
# 作用：图像横向或纵向"歪斜"，模拟特殊拍摄角度
# 默认：0.0
# 当前：0.0
# 推荐范围：通常 0；冰箱场景拍摄角度固定，没必要 shear
shear: 0.0

# perspective — 透视变换幅度
# 作用：模拟近大远小的透视失真
# 默认：0.0
# 当前：0.0005
# 推荐范围：
#   - 平视拍摄：0.0
#   - 俯视/仰视带透视：0.0001 ~ 0.001
# 推荐保持 0.0005，模拟你 45° 俯视摄像头的轻微透视
perspective: 0.0005

# flipud — 上下翻转概率
# 作用：把图片上下颠倒（翻 X 轴）
# 默认：0.0
# 当前：0.5
# 推荐范围：
#   - 自然场景（人/车）：0（不能翻，倒过来不合理）
#   - 冰箱顶视角：0.5（食材摆放方向无所谓）
# 推荐保持 0.5
flipud: 0.5

# fliplr — 左右翻转概率
# 作用：把图片左右镜像（翻 Y 轴）
# 默认：0.5
# 当前：0.5
# 推荐范围：几乎所有场景都用 0.5（除非物体本身有左右属性，如交通标志）
fliplr: 0.5

# mosaic — Mosaic 增强概率
# 作用：把 4 张训练图随机拼成 1 张，模型一次见到 4 个不同场景的目标
#      这是 YOLOv5 最强的增强之一，能极大丰富 batch 内目标种类
# 默认：1.0（全开）
# 当前：1.0
# 推荐范围：
#   - 阶段 B（公开数据，背景五花八门）：1.0（拉满）
#   - 阶段 C（自采冰箱数据，背景统一）：0.3 ~ 0.6（避免拼图破坏空间布局）
# 你现在是阶段 B 训练，1.0 合理
mosaic: 1.0

# mixup — Mixup 增强概率
# 作用：把两张图按透明度叠加，模型要在"半透明的两个目标"上同时识别
# 默认：0.0
# 当前：0.15
# 推荐范围：
#   - 通用场景：0.05 ~ 0.15
#   - 数据少时：可调到 0.2 ~ 0.3
# 推荐保持 0.15
mixup: 0.15

# copy_paste — Copy-Paste 增强概率
# 作用：随机把一张图里的目标抠下来贴到另一张图上，等效于增加目标密度
# 默认：0.0
# 当前：0.15
# 推荐范围：
#   - 数据少 / 类别不平衡：0.1 ~ 0.3
#   - 数据充足：0.0 ~ 0.1
# 你这数据集 juice_bottle / fresh_box / walnut 等类几乎没样本，
# copy_paste 能让稀有类被"贴"到更多图上，对类别不平衡有帮助
# 推荐保持 0.15，甚至可以调到 0.3 试试
copy_paste: 0.5
