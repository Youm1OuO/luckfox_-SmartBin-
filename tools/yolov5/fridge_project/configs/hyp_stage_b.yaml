# =============================================================================
# 阶段 B 训练用超参（stage-b training hyperparameters）
# -----------------------------------------------------------------------------
# 跟 hyp_finetune.yaml 几乎一样,只把 lr0 调回 0.01。
# 用途:
#   stage-b 是"从 yolov5s.pt 出发训 43 类"——COCO 80 类的分类头会被丢掉
#   重建为 43 类,所以这一步本质上是"半从零训",学习率不能用 0.001 那么小,
#   否则训不动。
#
# 跟 hyp.scratch-low.yaml(yolov5 自带)的差异:
#   - 数据增强参数(hsv_v / degrees / mosaic / mixup / copy_paste 等)是
#     针对冰箱顶视角场景调过的,比官方默认更猛
#   - iou_t 调到 0.15(官方 0.20)、fl_gamma 调到 1.5(官方 0.0),
#     针对类别不平衡 + 遮挡场景做了优化
#
# 想再继续修改,请同时考虑改 hyp_finetune.yaml 的对应行——除了 lr0/lrf 之外
# 两份 yaml 应该保持其它参数一致,这样 stage-b → stage-c 是"无痛接力"。
# =============================================================================


# ---- 1. 优化器 ---------------------------------------------------------

# 学习率:从零训这一阶段必须用 0.01
# (微调阶段 hyp_finetune.yaml 用 0.001)
lr0: 0.01

# 最终学习率因子(cosine 衰减到 lr0 * lrf)
lrf: 0.01

momentum: 0.937
weight_decay: 0.0005


# ---- 2. Warmup ---------------------------------------------------------

# 从零训需要长一点的 warmup
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1


# ---- 3. 损失函数权重 ---------------------------------------------------

box: 0.05
cls: 0.5
cls_pw: 1.0
obj: 1.0
obj_pw: 1.0


# ---- 4. IoU / Anchor / Focal Loss --------------------------------------

# 对部分遮挡场景友好(0.20 → 0.15)
iou_t: 0.15

anchor_t: 4.0

# 缓解类别不平衡(hand 1883 张 vs walnut 3 张)
fl_gamma: 1.5


# ---- 5. 数据增强 -------------------------------------------------------

hsv_h: 0.015
hsv_s: 0.7

# 冰箱内光照变化大,加强亮度抖动
hsv_v: 0.7

# 冰箱内物品摆放方向随意,可以旋转
degrees: 15.0

translate: 0.1

# 加大缩放幅度,让模型见到更多"小尺寸"目标(俯视看罐口等)
scale: 0.7

shear: 0.0

# 模拟 45° 俯视摄像头的轻微透视
perspective: 0.0005

# 冰箱顶视角,上下翻转合理
flipud: 0.5
fliplr: 0.5

# Mosaic 拉满:阶段 B 数据来自不同公开数据集,用 mosaic 拼图能让模型在边界处
# 见到"半个目标",顺便缓解遮挡场景
mosaic: 1.0

mixup: 0.15

# Copy-Paste 加强:把目标抠下来贴到其它图,人为制造遮挡 + 缓解类别不平衡
copy_paste: 0.5
